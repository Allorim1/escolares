<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Acceso administrativo</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuario o Email</label>
        <input
          id="username"
          type="text"
          [ngModel]="username()"
          name="username"
          (ngModelChange)="username.set($event)"
          placeholder="Ingresa tu usuario o email"
          required
        />
      </div>

      <div class="form-group password-group">
        <label for="password">Contraseña</label>
        <div class="password-input-wrapper">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            name="password"
            (ngModelChange)="password.set($event)"
            placeholder="Ingresa tu contraseña"
            required
          />
          <button type="button" class="toggle-password" (click)="showPassword.set(!showPassword())" tabindex="-1" [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <svg *ngIf="!showPassword()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="showPassword()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="error-message">{{ error() }}</div>
      }

      <button type="submit" class="login-btn" [disabled]="authService.loginLoading()">
        @if (authService.loginLoading()) {
          <span>Cargando...</span>
        } @else {
          <span>Iniciar sesión</span>
        }
      </button>
    </form>

    <a class="back-link" routerLink="/">Volver al inicio</a>
    <a class="register-link" routerLink="/register">Crear cuenta</a>
  </div>
</div>
