<div class="marcas-container">
  <h2>Gestión de Marcas</h2>

  <div class="add-marca-form">
    <input
      #marcaInput
      type="text"
      placeholder="Nueva marca..."
      (keyup.enter)="agregarMarca(marcaInput.value); marcaInput.value = ''"
    />
    <button (click)="agregarMarca(marcaInput.value); marcaInput.value = ''">Agregar</button>
  </div>

  <ul class="marcas-list">
    @for (marca of marcas(); track $index) {
      <li>
        @if (editingIndex() === $index) {
          <input
            #editInput
            type="text"
            [value]="marca"
            (keyup.enter)="guardarEdicion($index, editInput.value)"
            class="edit-input"
          />
          <div class="actions">
            <button
              class="save-btn"
              (click)="guardarEdicion($index, editInput.value)"
              title="Guardar"
            >
              💾
            </button>
            <button class="cancel-btn" (click)="cancelarEdicion()" title="Cancelar">✖</button>
          </div>
        } @else {
          <a [routerLink]="['/products/collection', marca]" class="marca-link">{{ marca }}</a>
          <div class="actions">
            <button class="edit-btn" (click)="activarEdicion($index)" title="Editar">✎</button>
            <button class="delete-btn" (click)="eliminarMarca($index)" title="Eliminar">
              &times;
            </button>
          </div>
        }
      </li>
    } @empty {
      <li class="empty">No hay marcas registradas.</li>
    }
  </ul>
</div>
