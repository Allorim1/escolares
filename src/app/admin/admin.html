<div class="admin-container">
  <aside class="admin-sidebar">
    <h2>Panel</h2>
    <nav class="admin-nav">
      @for (categoria of categorias(); track categoria.name; let i = $index) {
        <div class="menu-categoria">
          <button class="categoria-header" (click)="toggleCategoria(i)">
            <span>{{ categoria.name }}</span>
            <span class="toggle-icon">{{ categoria.expanded ? '▼' : '▶' }}</span>
          </button>
          @if (categoria.expanded) {
            <div class="categoria-items">
              @for (item of categoria.items; track item.route) {
                <a [routerLink]="item.route" routerLinkActive="active">{{ item.label }}</a>
              }
            </div>
          }
        </div>
      }
    </nav>
    <div class="admin-footer">
      <span>Bienvenido, {{ authService.user()?.username }}</span>
      <button (click)="logout()" class="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="admin-content">
    <router-outlet></router-outlet>
  </main>
</div>
