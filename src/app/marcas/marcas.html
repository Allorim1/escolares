<div class="marcas-container">
  <h2 class="page-title">Marcas</h2>

  <div class="marcas-grid">
    @for (marca of marcas(); track marca.id) {
      <a [routerLink]="['/products/collection', marca.name]" class="marca-card">
        @if (marca.image) {
          <img [src]="marca.image" [alt]="marca.name" class="marca-image" />
        } @else {
          <div class="marca-placeholder">{{ marca.name.charAt(0) }}</div>
        }
        <span class="marca-name">{{ marca.name }}</span>
      </a>
    } @empty {
      <div class="empty">No hay marcas registradas.</div>
    }
  </div>
</div>
