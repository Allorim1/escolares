<section class="ajustes-container">
  <h3>Ajustes de Cuenta</h3>

  @if (mensaje()) {
    <div class="mensaje" [class.error]="tipoMensaje() === 'error'" [class.success]="tipoMensaje() === 'success'">
      {{ mensaje() }}
    </div>
  }

  <div class="ajuste-section">
    <h4>Cambiar Correo Electrónico</h4>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="email" placeholder="tu@email.com" />
    </div>
    <div class="form-group">
      <label>Contraseña actual *</label>
      <input type="password" [(ngModel)]="emailPassword" placeholder="Ingresa tu contraseña actual" />
    </div>
    <button class="btn-guardar" (click)="guardarEmail()" [disabled]="guardando()">
      {{ guardando() ? 'Guardando...' : 'Actualizar Correo' }}
    </button>
  </div>

  <div class="ajuste-section">
    <h4>Cambiar Contraseña</h4>
    <div class="form-group">
      <label>Contraseña actual *</label>
      <input type="password" [(ngModel)]="currentPassword" placeholder="Ingresa tu contraseña actual" />
    </div>
    <div class="form-group">
      <label>Nueva contraseña *</label>
      <input type="password" [(ngModel)]="newPassword" placeholder="Mínimo 6 caracteres" />
    </div>
    <div class="form-group">
      <label>Confirmar nueva contraseña *</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Repite la nueva contraseña" />
    </div>
    <button class="btn-guardar" (click)="cambiarContrasena()" [disabled]="guardando()">
      {{ guardando() ? 'Guardando...' : 'Cambiar Contraseña' }}
    </button>
  </div>
</section>
