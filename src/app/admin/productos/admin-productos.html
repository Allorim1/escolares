<div class="productos-admin">
  <img src="/ESCOLARES AZUL RIF GRANDE.png" alt="Logo" style="height: 60px; margin-bottom: 10px;">
  <div class="header">
    <h2>Gestión de Productos</h2>
    <div class="header-actions">
      <button class="add-btn" (click)="showAddForm()">+ Agregar Producto</button>
    </div>
  </div>


<!-- Category Modal -->
@if (showCategoryModal()) {
  <div class="modal-overlay" (click)="closeCategoryModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Gestionar Categorías</h3>
        <button class="close-btn" (click)="closeCategoryModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="add-category-form">
          <input type="text" [(ngModel)]="newCategoryName" placeholder="Nueva categoría" class="form-input" />
          <button class="btn-primary" (click)="addCategory()">Agregar</button>
        </div>
        <div class="categories-list">
          @for (cat of categorias; track cat.id) {
            <div class="category-item">
              <span>{{ cat.nombre }}</span>
              <button class="btn-delete" (click)="deleteCategory(cat)">&times;</button>
            </div>
  }
        </div>
      </div>
    </div>
  </div>
}
